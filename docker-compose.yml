version: '3.8'
services:
  todo-app:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./src:/app/src
    environment:
      - NODE_ENV=production
  
  jenkins:
    image: jenkins/jenkins:lts
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JENKINS_OPTS="--prefix=/jenkins"

volumes:
  jenkins_home: