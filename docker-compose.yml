version: '3.8'
services:
  jenkins:
    build: 
      context: .
      dockerfile: jenkins.Dockerfile
    privileged: true
    user: root
    ports:
      - 8080:8080
      - 50000:50000
    container_name: jenkins
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

      
  todo-app:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - jenkins

volumes:
  jenkins_home: